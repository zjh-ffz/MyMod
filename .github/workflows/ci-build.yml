name: Build & Test MyMod PGP

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'build.gradle'
      - 'gradle.properties'
      - '.github/workflows/ci-build.yml'
  pull_request:
    branches: [main]

env:
  JAVA_VERSION: 17
  FORGE_VERSION: 1.20.1-47.3.0
  MOD_VERSION: 1.0.0

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'gradle'  # 启用Gradle缓存

      # 修复点：替换已过时的gradle-build-action为官方推荐的setup-gradle
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          cache-read-only: false  # 启用缓存读写
          cache-encryption-key: ${{ secrets.GRADLE_CACHE_KEY }}  # 可选：缓存加密密钥

      - name: Build Mod (with tests)
        run: ./gradlew build --no-daemon

      - name: Verify JAR integrity
        run: |
          jar -tf build/libs/mymod-${{ env.MOD_VERSION }}-${{ env.FORGE_VERSION }}.jar | head -20

      - name: Sign JAR (for CurseForge)
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > mymod.keystore
          jarsigner -keystore mymod.keystore -storepass changeit \
                    -keypass changeit \
                    build/libs/mymod-${{ env.MOD_VERSION }}-${{ env.FORGE_VERSION }}.jar mymod
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }} # ⚠️ 请在 GitHub Secrets 中预存 base64 编码的 keystore

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: mymod-${{ env.MOD_VERSION }}-${{ env.FORGE_VERSION }}-signed.jar
          path: build/libs/mymod-${{ env.MOD_VERSION }}-${{ env.FORGE_VERSION }}.jar
