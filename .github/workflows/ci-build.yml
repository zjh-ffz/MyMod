name: Build & Test MyMod PGP

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'build.gradle'
      - 'gradle.properties'
      - '.github/workflows/ci-build.yml'
  pull_request:
    branches: [main]

env:
  JAVA_VERSION: 17
  FORGE_VERSION: 1.20.1-47.3.0
  MOD_VERSION: 1.0.0

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'gradle'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          cache-read-only: false
          cache-encryption-key: ${{ secrets.GRADLE_CACHE_KEY }}

      - name: Import GPG key
        if: ${{ env.GPG_PRIVATE_KEY_BASE64 != '' }}
        run: |
          export GNUPGHOME=$(mktemp -d)
          echo "$GPG_PRIVATE_KEY_BASE64" | base64 --decode | gpg --batch --import
        env:
          GPG_PRIVATE_KEY_BASE64: ${{ secrets.GPG_PRIVATE_KEY_BASE64 }}

      - name: Build Mod (with tests)
        run: ./gradlew build --no-daemon --no-configuration-cache

      - name: Sign JAR with GPG
        if: ${{ env.GPG_PRIVATE_KEY_BASE64 != '' }}
        run: |
          export GNUPGHOME=$(mktemp -d)
          echo "$GPG_PRIVATE_KEY_BASE64" | base64 --decode | gpg --batch --import
          gpg --batch --yes --pinentry-mode loopback --passphrase "$GPG_PASSPHRASE" \
            --detach-sign --armor build/libs/mymod-${{ env.MOD_VERSION }}-${{ env.FORGE_VERSION }}.jar
        env:
          GPG_PRIVATE_KEY_BASE64: ${{ secrets.GPG_PRIVATE_KEY_BASE64 }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

      - name: Upload Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mymod-${{ env.MOD_VERSION }}
          path: |
            build/libs/mymod-${{ env.MOD_VERSION }}.jar
